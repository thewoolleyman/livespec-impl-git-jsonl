# lefthook.yml — livespec-orchestrator-git-jsonl git hook configuration.
#
# Generated from livespec/templates/impl-plugin/lefthook.yml.jinja
# at copier-copy time; re-sync via `copier update --vcs-ref=master` when livespec
# publishes a new release.
#
# Authority: livespec/SPECIFICATION/contracts.md
#   §"Pre-commit step ordering" — pre-commit runs three commands in order
#   (00-lint-autofix-staged, 01-commit-pairs-source-and-test,
#   02-check-pre-commit); commit-msg runs red-green-replay; pre-push runs the
#   full aggregate. Earlier steps fail-fast so a missing test pair surfaces
#   without waiting for pytest.
#
# Worktree-discipline gate: the worktree-only repository mutation protocol (see
# AGENTS.md §"Repository mutation protocol") is enforced by the STRUCTURAL
# commit-refuse hook — the canonical body that `just bootstrap` installs (via
# `just install-commit-refuse-hooks`, which REUSES the shared
# `livespec-dev-tooling` installer module — the SINGLE source of the hook body,
# no repo-vendored copy) at .git/hooks/pre-commit, .git/hooks/pre-push, and
# .git/hooks/commit-msg. That body refuses a commit/push on the PRIMARY checkout
# (exit 1 when
# `git rev-parse --git-dir` equals `git rev-parse --git-common-dir`; a linked
# worktree's git-dir is `.git/worktrees/<name>` and so differs) UNLESS
# `git config livespec.sandboxExempt` is `true`, then delegates to mise-managed
# lefthook so the gates below fire. It is armed on install — there is no
# `livespec.primaryPath` arming step and so no fail-open window — and it WRAPS
# lefthook rather than being a lefthook job. The commit-msg install covers
# `git commit --allow-empty` (which lefthook v2 skips at pre-commit when there
# are zero staged files), so no separate lefthook backstop is needed.
#
# Authority: livespec/SPECIFICATION/non-functional-requirements.md
#   §"Toolchain pins" — `run:` fields MUST delegate to `just <target>`
#   and MUST NOT shell out to underlying tools directly (the spec's
#   lefthook-must-delegate-to-just rule, enforced by
#   dev-tooling/checks/no_direct_tool_invocation.py).
#
# Activation: `just bootstrap` installs the canonical commit-refuse hook by
# REUSING the shared `livespec-dev-tooling` installer
# (`python -m livespec_dev_tooling.install_commit_refuse_hooks`, the SINGLE
# source of the hook body) into .git/hooks/pre-commit, .git/hooks/pre-push, and
# .git/hooks/commit-msg. The installed body invokes
# `mise exec -- lefthook run --no-auto-install <hook-name> "$@"` so the gates
# fire regardless of shell config and commit-msg argv[1] (the commit-message
# file path) reaches the red-green-replay hook.

pre-commit:
  commands:
    00-lint-autofix-staged:
      run: just lint-autofix-staged
    01-commit-pairs-source-and-test:
      run: just check-commit-pairs-source-and-test
    02-check-pre-commit:
      run: just check-pre-commit

commit-msg:
  commands:
    00-red-green-replay:
      run: just check-red-green-replay {1}

pre-push:
  commands:
    check:
      run: just check-pre-push
